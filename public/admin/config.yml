backend:
  name: github
  repo: lantean600/lanteanblog
  branch: main

local_backend:
  url: /api/v1

publish_mode: simple

media_folder: public/images
public_folder: /images

slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: research
    label: Research
    folder: src/content/research
    create: true
    extension: md
    format: frontmatter
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} - {{date}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: date, format: "YYYY-MM-DD" }
      - label: Category
        name: category
        widget: select
        default: research
        options:
          - { label: Research, value: research }
          - { label: Technical, value: technical }
          - { label: Daily, value: daily }
          - { label: Journal, value: journal }
      - label: Tags
        name: tags
        widget: list
        default: []
      - { label: Collection, name: collection, widget: string, required: false }
      - { label: Hero Image, name: heroImage, widget: image, required: false, default: "/images/yachiyo.jpg" }
      - { label: Hero Link, name: heroLink, widget: string, required: false }
      - { label: Excerpt, name: excerpt, widget: text }
      - { label: Body, name: body, widget: markdown }

  - name: technical
    label: Technical

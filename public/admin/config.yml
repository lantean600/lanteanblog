      - { name: heroLink, label: 头图来源链接, widget: string, required: false }
      - { name: excerpt, label: 摘要, widget: text, required: false }
      - { name: views, label: 阅读量, widget: number, value_type: int, default: 0, required: false }
      - { name: body, label: 正文, widget: markdown }

